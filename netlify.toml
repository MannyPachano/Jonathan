# Netlify — https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"

# Hashed Astro assets are safe to cache forever
[[headers]]
for = "/_astro/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
